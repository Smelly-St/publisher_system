<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить проект</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Datepicker -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Издательство</a>
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
                <a class="nav-link" href="{% url 'project-list' %}">Проекты</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'author-list' %}">Авторы</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'report-dashboard' %}">Отчёты</a>
            </li>
        </ul>
    </div>
</nav>
<div class="container mt-5">
    <h2>Добавить новый проект</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'project-list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Datepicker JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>

<!-- Локализация на русский -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/locales/bootstrap-datepicker.ru.min.js"></script>

<script>
    $(document).ready(function() {
        $('#id_start_date').datepicker({
            format: 'yyyy-mm-dd',
            language: 'ru',
            autoclose: true,
        });

        $('#id_end_date').datepicker({
            format: 'yyyy-mm-dd',
            language: 'ru',
            autoclose: true,
        });
    });
</script>

</body>
</html>
