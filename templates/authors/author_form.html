{% extends "base.html" %}

{% block title %}
Добавить автора
{% endblock %}

{% block content %}
<h2>Добавить нового автора</h2>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.full_name.id_for_label }}" class="form-label">ФИО автора</label>
        {{ form.full_name }}
    </div>

    <div class="mb-3">
        <label for="{{ form.contact_info.id_for_label }}" class="form-label">Контактная информация</label>
        {{ form.contact_info }}
    </div>

    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'author-list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
