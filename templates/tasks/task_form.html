{% extends "base.html" %}
{% block title %}{{ form_title }} — Задачи{% endblock %}
{% block content %}
<h2>{{ form_title }}</h2>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.project.id_for_label }}" class="form-label">Проект</label>
        {{ form.project }}
    </div>

    <div class="mb-3">
        <label for="{{ form.title.id_for_label }}" class="form-label">Описание задачи</label>
        {{ form.title }}
    </div>

    <div class="mb-3">
        <label for="{{ form.assignee.id_for_label }}" class="form-label">Исполнитель</label>
        {{ form.assignee }}
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-6">
            <label for="{{ form.due_date.id_for_label }}" class="form-label">Срок выполнения</label>
            {{ form.due_date }}
        </div>
        <div class="col-md-6">
            <label for="{{ form.status.id_for_label }}" class="form-label">Статус</label>
            {{ form.status }}
        </div>
    </div>

    <button type="submit" class="btn btn-primary">
        {% if form.instance.pk %}
            Сохранить изменения
        {% else %}
            Добавить задачу
        {% endif %}
    </button>
    <a href="{% url 'task-list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
