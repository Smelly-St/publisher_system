<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Издательство{% endblock %}</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Навигационное меню -->
<!-- templates/base.html -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}">Издательство</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="{% url 'project-list' %}">Проекты</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'author-list' %}">Авторы</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'task-list' %}">Задачи</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'manuscript-list' %}">Рукописи</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'report-dashboard' %}">Отчёты</a></li>

            <!-- Личный кабинет -->
            {% if user.is_authenticated %}
                <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Профиль</a></li>
            {% endif %}
        </ul>
    </div>
</nav>

<!-- Основной контент -->
<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

<!-- Дополнительные JS скрипты -->
{% block extra_js %}
{% endblock %}

</body>
</html>
